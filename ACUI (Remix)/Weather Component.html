<!DOCTYPE html>
<html lang="zh">
<head>
<meta charset="UTF-8">
<title>ACUI — 天气组件</title>
<script src="https://unpkg.com/react@18.3.1/umd/react.development.js" integrity="sha384-hD6/rw4ppMLGNu3tX5cjIb+uRZ7UkRJ6BPkLpg4hAu/6onKUg4lLsHAs9EBPT82L" crossorigin="anonymous"></script>
<script src="https://unpkg.com/react-dom@18.3.1/umd/react-dom.development.js" integrity="sha384-u6aeetuaXnQ38mYT8rp6sbXaQe3NL9t+IBXmnYxwkUI2Hw4bsp2Wvmx4yRQF1uAm" crossorigin="anonymous"></script>
<script src="https://unpkg.com/@babel/standalone@7.29.0/babel.min.js" integrity="sha384-m08KidiNqLdpJqLq95G/LEi8Qvjl/xUYll3QILypMoQ65QorJ9Lvtp2RXYGBFj1y" crossorigin="anonymous"></script>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@200;300;400;500;600&display=swap');
  * { box-sizing: border-box; margin: 0; padding: 0; }
  body { background: #08090f; display: flex; align-items: center; justify-content: center; min-height: 100vh; font-family: 'Inter', sans-serif; }

  @keyframes fadeIn   { from{opacity:0;transform:translateY(14px) scale(0.97)} to{opacity:1;transform:translateY(0) scale(1)} }
  @keyframes floatY   { 0%,100%{transform:translateY(0)} 50%{transform:translateY(-5px)} }
  @keyframes spinSun  { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @keyframes shimmer  { 0%,100%{opacity:0.5} 50%{opacity:1} }
  @keyframes rainDrop { 0%{transform:translateY(-8px);opacity:0} 15%{opacity:0.7} 100%{transform:translateY(80px);opacity:0} }
  @keyframes snowFall { 0%{transform:translateY(-8px) rotate(0deg);opacity:0} 15%{opacity:0.85} 100%{transform:translateY(80px) rotate(360deg);opacity:0} }
  @keyframes cloudDrift{ 0%,100%{transform:translateX(0)} 50%{transform:translateX(5px)} }
  @keyframes lightning { 0%,88%,100%{opacity:0} 90%,96%{opacity:1} }
  @keyframes cardFlash  { 0%,87%,100%{opacity:0} 89%{opacity:1} 91%,99%{opacity:0} 93%{opacity:0.6} }
  @keyframes boltDrop   { 0%{opacity:0;transform:scaleY(0);transformOrigin:top} 5%{opacity:1;transform:scaleY(1)} 15%{opacity:0} 100%{opacity:0} }
  @keyframes fogDrift  { 0%{transform:translateX(-15px);opacity:0} 50%{opacity:0.6} 100%{transform:translateX(15px);opacity:0} }
  @keyframes heatWave  { 0%,100%{transform:scaleX(1) translateY(0);opacity:0.4} 50%{transform:scaleX(1.04) translateY(-3px);opacity:0.7} }
  @keyframes typhoonSpin { from{transform:rotate(0deg)} to{transform:rotate(360deg)} }
  @keyframes typhoonSpin2 { from{transform:rotate(0deg)} to{transform:rotate(-360deg)} }
  @keyframes warningPulse { 0%,100%{box-shadow:0 0 0 0 rgba(255,50,50,0.5)} 50%{box-shadow:0 0 0 8px rgba(255,50,50,0)} }
  @keyframes heavyRain { 0%{transform:translateY(-6px);opacity:0} 10%{opacity:1} 100%{transform:translateY(90px);opacity:0} }

  .wb { padding:4px 12px; border-radius:14px; border:1px solid rgba(255,255,255,0.12); background:transparent; color:rgba(255,255,255,0.4); font-size:11px; font-family:'Inter',sans-serif; cursor:pointer; transition:all 0.2s; }
  .wb:hover  { border-color:rgba(255,255,255,0.3); color:rgba(255,255,255,0.7); }
  .wb.active { background:rgba(255,255,255,0.12); border-color:rgba(255,255,255,0.35); color:#fff; }
</style>
</head>
<body>
<div id="root"></div>
<script type="text/babel">
const { useState, useRef } = React;

/* ── SVG Weather Icons ── */
const SunIcon = ({ size=80 }) => (
  <svg width={size} height={size} viewBox="0 0 64 64" fill="none">
    {/* rays */}
    {[0,45,90,135,180,225,270,315].map((deg,i)=>(
      <line key={i}
        x1={32 + Math.cos(deg*Math.PI/180)*17} y1={32 + Math.sin(deg*Math.PI/180)*17}
        x2={32 + Math.cos(deg*Math.PI/180)*24} y2={32 + Math.sin(deg*Math.PI/180)*24}
        stroke="#fde68a" strokeWidth="2.5" strokeLinecap="round"
        style={{ animation:`shimmer ${1.5+i*0.2}s ease-in-out infinite`, animationDelay:`${i*0.15}s` }}
      />
    ))}
    {/* core */}
    <circle cx="32" cy="32" r="13" fill="#fbbf24"/>
    <circle cx="32" cy="32" r="13" fill="url(#sunGrad)"/>
    <defs>
      <radialGradient id="sunGrad" cx="35%" cy="30%">
        <stop offset="0%" stopColor="#fff176" stopOpacity="0.6"/>
        <stop offset="100%" stopColor="#f59e0b" stopOpacity="0"/>
      </radialGradient>
    </defs>
  </svg>
);

const CloudIcon = ({ size=80, rain=false, snow=false, storm=false }) => (
  <svg width={size} height={size} viewBox="0 0 64 64" fill="none">
    <defs>
      <linearGradient id="cloudG" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor="#cbd5e1"/>
        <stop offset="100%" stopColor="#94a3b8"/>
      </linearGradient>
      <linearGradient id="darkCloudG" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor="#475569"/>
        <stop offset="100%" stopColor="#1e293b"/>
      </linearGradient>
    </defs>
    {/* back cloud */}
    <ellipse cx="38" cy="26" rx="14" ry="10" fill={storm||rain||snow?"#334155":"#b0bec5"} opacity="0.7"/>
    {/* main cloud */}
    <path d="M14 36 Q14 24 26 24 Q28 16 38 18 Q48 18 48 28 Q54 28 54 36 Z"
      fill={storm||rain||snow ? "url(#darkCloudG)" : "url(#cloudG)"}/>
    {rain && [20,28,36,44].map((x,i)=>(
      <line key={i} x1={x} y1="40" x2={x-3} y2="52"
        stroke="#7dd3fc" strokeWidth="2" strokeLinecap="round"
        style={{ animation:`rainDrop 1s linear infinite`, animationDelay:`${i*0.2}s` }}/>
    ))}
    {snow && [20,29,38,47].map((x,i)=>(
      <circle key={i} cx={x} cy="48" r="2"
        fill="#bae6fd"
        style={{ animation:`snowFall 1.8s linear infinite`, animationDelay:`${i*0.35}s` }}/>
    ))}
    {storm && <>
      {[20,30].map((x,i)=>(
        <line key={i} x1={x+i*4} y1="40" x2={x-3+i*4} y2="52"
          stroke="#7dd3fc" strokeWidth="1.5" strokeLinecap="round" opacity="0.7"
          style={{ animation:`rainDrop 0.8s linear infinite`, animationDelay:`${i*0.15}s` }}/>
      ))}
      <polygon points="38,36 33,46 37,46 31,58 42,44 37,44"
        fill="#fde68a"
        style={{ animation:`lightning 2.5s ease-in-out infinite` }}/>
    </>}
  </svg>
);

const FogIcon = ({ size=80 }) => (
  <svg width={size} height={size} viewBox="0 0 64 64" fill="none">
    {[{y:22,w:36,x:14},{y:30,w:28,x:18},{y:38,w:36,x:14},{y:46,w:24,x:20}].map((l,i)=>(
      <rect key={i} x={l.x} y={l.y} width={l.w} height="4" rx="2"
        fill={`rgba(${180+i*10},${160+i*8},${120+i*6},0.7)`}
        style={{ animation:`fogDrift ${3+i*0.7}s ease-in-out infinite`, animationDelay:`${i*0.5}s` }}/>
    ))}
  </svg>
);

const SnowIcon = ({ size=80 }) => (
  <svg width={size} height={size} viewBox="0 0 64 64" fill="none">
    {/* snowflake */}
    {[0,60,120,180,240,300].map((deg,i)=>(
      <g key={i} transform={`rotate(${deg} 32 32)`}>
        <line x1="32" y1="10" x2="32" y2="54" stroke="#bae6fd" strokeWidth="2.5" strokeLinecap="round"/>
        <line x1="24" y1="22" x2="32" y2="30" stroke="#bae6fd" strokeWidth="2" strokeLinecap="round"/>
        <line x1="40" y1="22" x2="32" y2="30" stroke="#bae6fd" strokeWidth="2" strokeLinecap="round"/>
      </g>
    ))}
    <circle cx="32" cy="32" r="4" fill="#e0f2fe"/>
  </svg>
);


const HeatIcon = ({ size=80 }) => (
  <svg width={size} height={size} viewBox="0 0 80 80" fill="none">
    <defs>
      <radialGradient id="heatCore" cx="40%" cy="35%">
        <stop offset="0%" stopColor="#ff6b35"/>
        <stop offset="100%" stopColor="#cc2200"/>
      </radialGradient>
    </defs>
    {[0,45,90,135,180,225,270,315].map((deg,i)=>(
      <line key={i}
        x1={40+Math.cos(deg*Math.PI/180)*18} y1={40+Math.sin(deg*Math.PI/180)*18}
        x2={40+Math.cos(deg*Math.PI/180)*28} y2={40+Math.sin(deg*Math.PI/180)*28}
        stroke="#ff9555" strokeWidth="2.5" strokeLinecap="round"
        style={{animation:`shimmer ${1.2+i*0.15}s ease-in-out infinite`,animationDelay:`${i*0.12}s`}}/>
    ))}
    <circle cx="40" cy="40" r="15" fill="url(#heatCore)"/>
    <circle cx="40" cy="40" r="15" fill="rgba(255,200,100,0.15)"/>
    {/* heat wave lines */}
    {[0,1,2].map(i=>(
      <path key={i} d={`M${18+i*8},${58+i*3} Q${28+i*8},${53+i*3} ${38+i*8},${58+i*3} Q${48+i*8},${63+i*3} ${58+i*8},${58+i*3}`}
        stroke="rgba(255,140,50,0.5)" strokeWidth="1.5" fill="none" strokeLinecap="round"
        style={{animation:`heatWave ${1.5+i*0.3}s ease-in-out infinite`,animationDelay:`${i*0.2}s`}}/>
    ))}
  </svg>
);

const TyphoonIcon = ({ size=80 }) => (
  <svg width={size} height={size} viewBox="0 0 80 80" fill="none">
    <circle cx="40" cy="40" r="36" stroke="rgba(120,80,200,0.3)" strokeWidth="1"/>
    <circle cx="40" cy="40" r="24" stroke="rgba(120,80,200,0.4)" strokeWidth="1.5"/>
    <g style={{transformOrigin:'40px 40px',animation:'typhoonSpin 4s linear infinite'}}>
      <path d="M40,10 Q60,20 55,40 Q50,60 40,55 Q30,50 35,40 Q40,30 40,10Z" fill="rgba(140,100,220,0.5)"/>
      <path d="M40,70 Q20,60 25,40 Q30,20 40,25 Q50,30 45,40 Q40,50 40,70Z" fill="rgba(100,160,220,0.5)"/>
    </g>
    <g style={{transformOrigin:'40px 40px',animation:'typhoonSpin2 3s linear infinite'}}>
      <path d="M10,40 Q20,20 40,25 Q60,30 55,40 Q50,50 40,45 Q20,40 10,40Z" fill="rgba(80,200,180,0.3)"/>
    </g>
    <circle cx="40" cy="40" r="6" fill="rgba(255,255,255,0.9)"/>
    <circle cx="40" cy="40" r="3" fill="rgba(140,100,220,1)"/>
  </svg>
);

const HeavyRainIcon = ({ size=80 }) => (
  <svg width={size} height={size} viewBox="0 0 80 80" fill="none">
    <defs>
      <linearGradient id="darkCloud2" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0%" stopColor="#1e2a3a"/>
        <stop offset="100%" stopColor="#0a1520"/>
      </linearGradient>
    </defs>
    <ellipse cx="50" cy="28" rx="18" ry="12" fill="#1e293b" opacity="0.8"/>
    <path d="M12 44 Q12 28 28 28 Q30 18 44 20 Q58 20 58 32 Q66 32 66 44 Z" fill="url(#darkCloud2)"/>
    {[16,24,32,40,48,56].map((x,i)=>(
      <g key={i}>
        <line x1={x} y1="48" x2={x-4} y2="62" stroke="#60a5fa" strokeWidth="2" strokeLinecap="round"
          style={{animation:`heavyRain ${0.6+i*0.08}s linear infinite`,animationDelay:`${i*0.1}s`}}/>
        <line x1={x+3} y1="56" x2={x-1} y2="72" stroke="#3b82f6" strokeWidth="1.5" strokeLinecap="round"
          style={{animation:`heavyRain ${0.6+i*0.08}s linear infinite`,animationDelay:`${i*0.1+0.3}s`}}/>
      </g>
    ))}
  </svg>
);
const ICONS = {
  sunny:  <SunIcon size={80}/>,
  cloudy: <CloudIcon size={80}/>,
  rainy:  <CloudIcon size={80} rain/>,
  snowy:  <SnowIcon size={80}/>,
  storm:  <CloudIcon size={80} storm/>,
  foggy:    <FogIcon size={80}/>,
  heat:     <HeatIcon size={80}/>,
  typhoon:  <TyphoonIcon size={80}/>,
  heavyRain:<HeavyRainIcon size={80}/>,
};

/* ── Weather configs ── */
const WEATHERS = {
  sunny:  { label:'晴天',  temp:26, feel:28, high:30, low:18, desc:'晴空万里', city:'北京', humidity:32, wind:'南风 3级', aqi:45,  gradient:'linear-gradient(135deg,#0f2355 0%,#1e4080 45%,#c2700a 100%)', accent:'#fbbf24', accentDim:'rgba(251,191,36,0.25)', textSub:'rgba(255,220,120,0.8)', particles:'rays', forecast:[{d:'明',i:'cloudy',h:27,l:17},{d:'后',i:'rainy',h:22,l:14},{d:'三',i:'sunny',h:29,l:18}] },
  cloudy: { label:'多云',  temp:20, feel:19, high:23, low:14, desc:'多云转阴', city:'上海', humidity:68, wind:'东北风 2级', aqi:62, gradient:'linear-gradient(135deg,#0f1825 0%,#1e3050 45%,#3a4f6a 100%)', accent:'#94a3b8', accentDim:'rgba(148,163,184,0.2)', textSub:'rgba(180,205,235,0.8)', particles:'clouds', forecast:[{d:'明',i:'rainy',h:18,l:11},{d:'后',i:'sunny',h:24,l:15},{d:'三',i:'sunny',h:28,l:17}] },
  rainy:  { label:'雨天',  temp:14, feel:12, high:16, low:10, desc:'中雨 · 注意出行', city:'成都', humidity:91, wind:'北风 1级', aqi:35, gradient:'linear-gradient(135deg,#060d18 0%,#0d2035 45%,#1040608 100%)', accent:'#38bdf8', accentDim:'rgba(56,189,248,0.2)', textSub:'rgba(130,200,255,0.8)', particles:'rain', forecast:[{d:'明',i:'rainy',h:15,l:9},{d:'后',i:'cloudy',h:18,l:12},{d:'三',i:'sunny',h:22,l:14}] },
  snowy:  { label:'雪天',  temp:-3, feel:-7, high:0,  low:-6, desc:'小雪 · 路滑注意安全', city:'哈尔滨', humidity:82, wind:'西北风 4级', aqi:28, gradient:'linear-gradient(135deg,#0a1220 0%,#162035 45%,#243348 100%)', accent:'#bae6fd', accentDim:'rgba(186,230,253,0.2)', textSub:'rgba(180,225,255,0.8)', particles:'snow', forecast:[{d:'明',i:'snowy',h:-1,l:-8},{d:'后',i:'snowy',h:1,l:-5},{d:'三',i:'cloudy',h:4,l:-2}] },
  storm:  { label:'雷暴',  temp:18, feel:16, high:22, low:15, desc:'强对流 · 请勿外出', city:'武汉', humidity:95, wind:'阵风 8级', aqi:40, gradient:'linear-gradient(135deg,#030508 0%,#0a1020 45%,#141e2e 100%)', accent:'#facc15', accentDim:'rgba(250,204,21,0.2)', textSub:'rgba(200,225,150,0.8)', particles:'storm', forecast:[{d:'明',i:'cloudy',h:21,l:14},{d:'后',i:'sunny',h:26,l:17},{d:'三',i:'sunny',h:28,l:18}] },
  heat:     { label:'高温预警🔴', temp:41, feel:46, high:42, low:30, desc:'红色预警 · 危险高温', city:'广州', humidity:55, wind:'南风 1级', aqi:80, warning:{level:'红色',color:'#ef4444',bg:'rgba(239,68,68,0.15)'}, gradient:'linear-gradient(135deg,#1a0500 0%,#3d0e00 45%,#7a1500 100%)', accent:'#ff6b35', accentDim:'rgba(255,107,53,0.3)', textSub:'rgba(255,180,120,0.85)', particles:'heat', forecast:[{d:'明',i:'heat',h:40,l:29},{d:'后',i:'heat',h:38,l:28},{d:'三',i:'sunny',h:33,l:26}] },
  typhoon:  { label:'台风预警🟣', temp:24, feel:22, high:26, low:21, desc:'橙色预警 · 台风"天鸽"', city:'厦门', humidity:95, wind:'12级阵风', aqi:30, warning:{level:'橙色',color:'#f97316',bg:'rgba(249,115,22,0.15)'}, gradient:'linear-gradient(135deg,#060412 0%,#0f0a28 45%,#1a1040 100%)', accent:'#a855f7', accentDim:'rgba(168,85,247,0.3)', textSub:'rgba(200,170,255,0.85)', particles:'typhoon', forecast:[{d:'明',i:'storm',h:22,l:20},{d:'后',i:'rainy',h:25,l:21},{d:'三',i:'cloudy',h:27,l:22}] },
  heavyRain:{ label:'暴雨预警🔴', temp:19, feel:17, high:21, low:17, desc:'红色预警 · 注意防洪', city:'重庆', humidity:98, wind:'北风 3级', aqi:25, warning:{level:'红色',color:'#ef4444',bg:'rgba(239,68,68,0.15)'}, gradient:'linear-gradient(135deg,#030a14 0%,#061525 45%,#0a2035 100%)', accent:'#3b82f6', accentDim:'rgba(59,130,246,0.3)', textSub:'rgba(130,195,255,0.85)', particles:'heavyRain', forecast:[{d:'明',i:'heavyRain',h:18,l:16},{d:'后',i:'rainy',h:20,l:17},{d:'三',i:'cloudy',h:23,l:18}] },
  foggy:  { label:'雾霾',  temp:16, feel:15, high:18, low:12, desc:'重度污染 · 减少外出', city:'郑州', humidity:88, wind:'静风', aqi:218, gradient:'linear-gradient(135deg,#120e06 0%,#241a08 45%,#332510 100%)', accent:'#d97706', accentDim:'rgba(217,119,6,0.2)', textSub:'rgba(220,190,120,0.8)', particles:'fog', forecast:[{d:'明',i:'foggy',h:17,l:11},{d:'后',i:'cloudy',h:20,l:13},{d:'三',i:'cloudy',h:22,l:15}] },
};

function aqiColor(a) { return a<=50?'#4ade80':a<=100?'#facc15':a<=150?'#fb923c':'#f87171'; }
function aqiLabel(a) { return a<=50?'优':a<=100?'良':a<=150?'轻度':'重度'; }

function ForecastIcon({ type, size=20 }) {
  const map = { sunny:<SunIcon size={size}/>, cloudy:<CloudIcon size={size}/>, rainy:<CloudIcon size={size} rain/>, snowy:<SnowIcon size={size}/>, storm:<CloudIcon size={size} storm/>, foggy:<FogIcon size={size}/>, heat:<HeatIcon size={size}/>, typhoon:<TyphoonIcon size={size}/>, heavyRain:<HeavyRainIcon size={size}/> };
  return map[type] || null;
}

/* ── Particle canvas ── */
function Particles({ type }) {
  const pts = useRef(Array.from({length:type==='rain'?20:type==='snow'?16:0},(_,i)=>({
    id:i, left:Math.random()*100, delay:Math.random()*2.5, dur:0.7+Math.random()*1.0,
  }))).current;

  if (type === 'rain') return (
    <div style={{position:'absolute',inset:0,overflow:'hidden',borderRadius:'inherit',pointerEvents:'none',zIndex:1}}>
      {pts.map(p=>(
        <div key={p.id} style={{position:'absolute',left:`${p.left}%`,top:0,width:1.5,height:12,background:'rgba(130,200,255,0.5)',borderRadius:1,animation:`rainDrop ${p.dur}s linear infinite`,animationDelay:`${p.delay}s`,transform:'rotate(8deg)'}}/>
      ))}
    </div>
  );
  if (type === 'snow') return (
    <div style={{position:'absolute',inset:0,overflow:'hidden',borderRadius:'inherit',pointerEvents:'none',zIndex:1}}>
      {pts.map(p=>(
        <div key={p.id} style={{position:'absolute',left:`${p.left}%`,top:0,width:3,height:3,borderRadius:'50%',background:'rgba(200,235,255,0.85)',animation:`snowFall ${p.dur+1.5}s linear infinite`,animationDelay:`${p.delay}s`}}/>
      ))}
    </div>
  );
  if (type === 'rays') return (
    <div style={{position:'absolute',inset:0,overflow:'hidden',borderRadius:'inherit',pointerEvents:'none',zIndex:1}}>
      {[...Array(5)].map((_,i)=>(
        <div key={i} style={{position:'absolute',bottom:'-10%',right:'5%',width:1.5,height:'80%',background:'linear-gradient(to top,rgba(251,191,36,0.15),transparent)',transformOrigin:'bottom right',transform:`rotate(${-35+i*12}deg)`,animation:`shimmer ${2+i*0.4}s ease-in-out infinite`,animationDelay:`${i*0.3}s`}}/>
      ))}
    </div>
  );
  if (type === 'clouds') return (
    <div style={{position:'absolute',inset:0,overflow:'hidden',borderRadius:'inherit',pointerEvents:'none',zIndex:1}}>
      {[{t:10,l:5,w:55,o:0.1,d:0},{t:25,l:55,w:40,o:0.07,d:2}].map((c,i)=>(
        <div key={i} style={{position:'absolute',top:`${c.t}%`,left:`${c.l}%`,width:`${c.w}%`,height:20,background:'rgba(180,200,230,0.15)',borderRadius:40,filter:'blur(5px)',animation:`cloudDrift ${4+i*2}s ease-in-out infinite`,animationDelay:`${c.d}s`}}/>
      ))}
    </div>
  );
  if (type === 'storm') return (
    <div style={{position:'absolute',inset:0,overflow:'hidden',borderRadius:'inherit',pointerEvents:'none',zIndex:1}}>
      {/* rain */}
      {pts.slice(0,16).map(p=>(
        <div key={p.id} style={{position:'absolute',left:`${p.left}%`,top:0,width:1.5,height:14,background:'rgba(100,160,200,0.45)',borderRadius:1,animation:`rainDrop ${p.dur*0.7}s linear infinite`,animationDelay:`${p.delay}s`,transform:'rotate(10deg)'}}/>
      ))}
      {/* card-wide flash overlay */}
      <div style={{position:'absolute',inset:0,background:'rgba(220,200,255,0.22)',borderRadius:'inherit',animation:'cardFlash 2.8s ease-in-out infinite',pointerEvents:'none'}}/>
      <div style={{position:'absolute',inset:0,background:'rgba(255,255,255,0.12)',borderRadius:'inherit',animation:'cardFlash 2.8s ease-in-out infinite',animationDelay:'0.08s',pointerEvents:'none'}}/>
      {/* large background bolt */}
      <svg style={{position:'absolute',top:0,left:'30%',width:80,height:'100%',opacity:0,animation:'cardFlash 2.8s ease-in-out infinite',animationDelay:'0.02s'}} viewBox="0 0 80 120" fill="none">
        <polygon points="50,0 20,55 42,55 10,120 65,48 40,48" fill="rgba(255,255,255,0.7)" filter="url(#glow)"/>
        <defs><filter id="glow"><feGaussianBlur stdDeviation="4" result="blur"/><feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge></filter></defs>
      </svg>
      {/* card border glow on flash */}
      <div style={{position:'absolute',inset:0,borderRadius:'inherit',border:'1.5px solid rgba(200,160,255,0.8)',boxShadow:'0 0 40px rgba(160,100,255,0.4), inset 0 0 24px rgba(180,120,255,0.08)',opacity:0,animation:'cardFlash 2.8s ease-in-out infinite',animationDelay:'0.01s',pointerEvents:'none'}}/>
    </div>
  );
  if (type === 'heat') return (
    <div style={{position:'absolute',inset:0,overflow:'hidden',borderRadius:'inherit',pointerEvents:'none',zIndex:1}}>
      {[...Array(5)].map((_,i)=>(
        <div key={i} style={{position:'absolute',top:`${25+i*12}%`,left:0,right:0,height:20,background:'rgba(255,100,20,0.07)',filter:'blur(10px)',animation:`heatWave ${2.5+i*0.6}s ease-in-out infinite`,animationDelay:`${i*0.4}s`}}/>
      ))}
    </div>
  );

  if (type === 'typhoon') return (
    <div style={{position:'absolute',inset:0,overflow:'hidden',borderRadius:'inherit',pointerEvents:'none',zIndex:1}}>
      <div style={{position:'absolute',top:'50%',right:'-30%',transform:'translateY(-50%)',width:160,height:160,borderRadius:'50%',border:'1px solid rgba(168,85,247,0.15)',animation:'typhoonSpin 8s linear infinite',opacity:0.5}}/>
      <div style={{position:'absolute',top:'50%',right:'-20%',transform:'translateY(-50%)',width:100,height:100,borderRadius:'50%',border:'1px solid rgba(168,85,247,0.2)',animation:'typhoonSpin2 5s linear infinite'}}/>
    </div>
  );

  if (type === 'heavyRain') return (
    <div style={{position:'absolute',inset:0,overflow:'hidden',borderRadius:'inherit',pointerEvents:'none',zIndex:1}}>
      {Array.from({length:28},(_,i)=>({id:i,left:Math.random()*100,delay:Math.random()*1.5,dur:0.4+Math.random()*0.5})).map(p=>(
        <div key={p.id} style={{position:'absolute',left:`${p.left}%`,top:0,width:1.5,height:16,background:'rgba(80,150,255,0.5)',borderRadius:1,animation:`heavyRain ${p.dur}s linear infinite`,animationDelay:`${p.delay}s`,transform:'rotate(10deg)'}}/>
      ))}
    </div>
  );

  if (type === 'fog') return (
    <div style={{position:'absolute',inset:0,overflow:'hidden',borderRadius:'inherit',pointerEvents:'none',zIndex:1}}>
      {[...Array(4)].map((_,i)=>(
        <div key={i} style={{position:'absolute',top:`${18+i*18}%`,left:0,right:0,height:16,background:'rgba(200,175,120,0.07)',filter:'blur(7px)',animation:`fogDrift ${3+i*0.9}s ease-in-out infinite`,animationDelay:`${i*0.7}s`}}/>
      ))}
    </div>
  );
  return null;
}

/* ── Horizontal Card ── */
function WeatherCard({ wk }) {
  const w = WEATHERS[wk];

  return (
    <div style={{
      width: 520, borderRadius: 18,
      background: w.gradient,
      border: `1px solid ${w.accentDim}`,
      boxShadow: `0 20px 56px rgba(0,0,0,0.65), 0 0 30px ${w.accentDim}`,
      overflow: 'hidden', position: 'relative',
      animation: 'fadeIn 0.45s cubic-bezier(0.16,1,0.3,1) both',
    }}>
      <Particles type={w.particles} />
      <div style={{position:'absolute',inset:0,background:'rgba(0,0,0,0.15)',borderRadius:'inherit',pointerEvents:'none',zIndex:2}}/>

      <div style={{ position:'relative', zIndex:3, display:'flex', padding:'28px 24px' }}>

        {/* LEFT: icon + temp */}
        <div style={{ display:'flex', flexDirection:'column', alignItems:'center', justifyContent:'center', width:150, flexShrink:0, gap:10 }}>
          <div style={{ animation: wk==='sunny'?`floatY 3s ease-in-out infinite`:wk==='snowy'?`floatY 4s ease-in-out infinite`:'none' }}>
            {ICONS[wk]}
          </div>
          <div style={{ textAlign:'center' }}>
            <div style={{ color:'#fff', fontSize:58, fontWeight:200, lineHeight:1, letterSpacing:'-2px' }}>
              {w.temp}<span style={{ fontSize:28, color:'rgba(255,255,255,0.55)', fontWeight:300 }}>°</span>
            </div>
            <div style={{ color:w.textSub, fontSize:11, marginTop:3, fontWeight:300 }}>{w.desc}</div>
          </div>
        </div>

        {/* DIVIDER */}
        <div style={{ width:1, background:`linear-gradient(to bottom, transparent, ${w.accent}50, transparent)`, margin:'0 18px', flexShrink:0 }}/>

        {/* RIGHT */}
        <div style={{ flex:1, display:'flex', flexDirection:'column', gap:12 }}>

          {/* City + tag */}
          <div style={{ display:'flex', alignItems:'center', justifyContent:'space-between' }}>
            <div>
              <div style={{ color:'rgba(255,255,255,0.9)', fontSize:14, fontWeight:500 }}>{w.city}</div>
              <div style={{ color:'rgba(255,255,255,0.35)', fontSize:10, marginTop:1 }}>
                体感 <span style={{ color:'rgba(255,255,255,0.6)' }}>{w.feel}°</span>
                &nbsp;·&nbsp;
                <span style={{ color:'rgba(255,255,255,0.6)' }}>{w.high}°</span>
                <span style={{ color:'rgba(255,255,255,0.3)' }}> / {w.low}°</span>
              </div>
            </div>
            <div style={{ display:'flex', gap:5, alignItems:'center' }}>
              {w.warning && (
                <div style={{ background:w.warning.bg, border:`1px solid ${w.warning.color}60`, borderRadius:5, padding:'2px 8px', color:w.warning.color, fontSize:9, fontWeight:600, letterSpacing:'0.05em', animation:'warningPulse 1.5s ease-in-out infinite' }}>
                  ⚠ {w.warning.level}预警
                </div>
              )}
              <div style={{ background:'rgba(255,255,255,0.07)', border:`1px solid ${w.accentDim}`, borderRadius:5, padding:'2px 7px', color:w.accent, fontSize:9, letterSpacing:'0.06em' }}>AI</div>
            </div>
          </div>

          {/* Stats */}
          <div style={{ display:'inline-flex', background:'rgba(0,0,0,0.22)', borderRadius:8, padding:'7px 12px', backdropFilter:'blur(4px)', alignItems:'center', gap:6 }}>
            <span style={{ color:'rgba(255,255,255,0.4)', fontSize:11 }}>🌬</span>
            <span style={{ color:'rgba(255,255,255,0.8)', fontSize:12, fontWeight:400 }}>{w.wind}</span>
          </div>

          {/* Forecast */}
          <div style={{ display:'flex', gap:6 }}>
            {w.forecast.map((f,i)=>(
              <div key={i} style={{
                flex:1, background:'rgba(0,0,0,0.18)', borderRadius:8,
                padding:'7px 6px', display:'flex', alignItems:'center', gap:7,
                border: i===0 ? `1px solid ${w.accent}35` : '1px solid transparent',
                backdropFilter:'blur(4px)',
              }}>
                <ForecastIcon type={f.i} size={22}/>
                <div>
                  <div style={{ color:'rgba(255,255,255,0.38)', fontSize:9 }}>{f.d}天</div>
                  <div style={{ color:'rgba(255,255,255,0.8)', fontSize:11, fontWeight:500 }}>{f.h}° <span style={{ color:'rgba(255,255,255,0.3)', fontWeight:400 }}>{f.l}°</span></div>
                </div>
              </div>
            ))}
          </div>
        </div>
      </div>
    </div>
  );
}

function App() {
  const [wk, setWk] = useState('sunny');
  return (
    <div style={{ display:'flex', flexDirection:'column', alignItems:'center', gap:20 }}>
      <WeatherCard wk={wk} />
      <div style={{ display:'flex', gap:6, flexWrap:'wrap', justifyContent:'center' }}>
        {Object.entries(WEATHERS).map(([k,v])=>(
          <button key={k} className={`wb ${wk===k?'active':''}`} onClick={()=>setWk(k)}>{v.label}</button>
        ))}
      </div>
    </div>
  );
}

ReactDOM.createRoot(document.getElementById('root')).render(<App />);
</script>
</body>
</html>
