<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Hehe 激活</title>
  <style>
    html, body {
      margin: 0;
      padding: 0;
      height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", "PingFang SC", "Microsoft YaHei", sans-serif;
      background:
        radial-gradient(circle at 18% 18%, rgba(107, 174, 255, 0.12), transparent 32%),
        radial-gradient(circle at 82% 78%, rgba(50, 112, 255, 0.10), transparent 34%),
        linear-gradient(160deg, #081019 0%, #0b1420 58%, #060b12 100%);
      color: #e7edf7;
      font-size: 16px;
      line-height: 1.6;
    }
    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 24px;
      box-sizing: border-box;
    }
    main {
      width: 520px;
      max-width: 100%;
      padding: 32px;
      border-radius: 22px;
      border: 1px solid rgba(150, 185, 255, 0.18);
      background: rgba(10, 17, 27, 0.8);
      box-shadow: 0 24px 80px rgba(0, 0, 0, 0.35);
      backdrop-filter: blur(20px);
    }
    h1 {
      margin: 0 0 8px;
      font-size: 28px;
      line-height: 1.2;
      font-weight: 700;
      color: #f5f8fd;
    }
    .subtitle {
      margin: 0 0 28px;
      font-size: 15px;
      color: #9db0c8;
    }
    .row {
      margin-bottom: 14px;
    }
    label {
      display: block;
      margin-bottom: 7px;
      font-size: 12px;
      color: #b1c1d7;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }
    .input-wrap {
      position: relative;
    }
    input {
      width: 100%;
      box-sizing: border-box;
      border: 1px solid rgba(132, 161, 204, 0.24);
      border-radius: 12px;
      background: rgba(16, 25, 38, 0.94);
      color: #edf4ff;
      padding: 13px 14px;
      font-size: 15px;
      outline: none;
      transition: border-color 0.15s ease, box-shadow 0.15s ease;
    }
    input:focus {
      border-color: rgba(117, 168, 255, 0.72);
      box-shadow: 0 0 0 4px rgba(59, 130, 246, 0.14);
    }
    input.has-detect {
      padding-right: 100px;
    }
    .detect-badge {
      position: absolute;
      right: 10px;
      top: 50%;
      transform: translateY(-50%);
      padding: 3px 9px;
      border-radius: 20px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.02em;
      color: #7dd8f5;
      background: rgba(100, 200, 245, 0.12);
      border: 1px solid rgba(100, 200, 245, 0.25);
      white-space: nowrap;
      pointer-events: none;
      opacity: 0;
      transition: opacity 0.2s;
    }
    .detect-badge.visible {
      opacity: 1;
    }
    button.primary {
      width: 100%;
      border: none;
      border-radius: 12px;
      background: linear-gradient(135deg, #4f8cff 0%, #3572ff 100%);
      color: #ffffff;
      padding: 14px 16px;
      font-size: 16px;
      font-weight: 700;
      cursor: pointer;
      transition: transform 0.15s ease, opacity 0.15s ease, filter 0.15s ease;
    }
    button.primary:hover:not(:disabled) {
      transform: translateY(-1px);
      filter: brightness(1.04);
    }
    button.primary:disabled {
      opacity: 0.55;
      cursor: not-allowed;
      transform: none;
      filter: none;
    }
    .status {
      margin-top: 14px;
      min-height: 22px;
      font-size: 14px;
      color: #9db0c8;
    }
    .status.err { color: #ff8f8f; }
    .status.ok  { color: #74d89f; }
    .model-note {
      margin: 0 0 24px;
      padding: 10px 14px;
      border-radius: 10px;
      background: rgba(16, 25, 38, 0.78);
      border: 1px solid rgba(132, 161, 204, 0.14);
      font-size: 13px;
      color: #d8e4f5;
    }
    .hint {
      margin-top: 18px;
      color: #8396ae;
      font-size: 13px;
    }
    .hint code {
      color: #9fcbff;
    }
    .divider {
      margin: 20px 0 0;
      border: none;
      border-top: 1px solid rgba(132, 161, 204, 0.12);
    }

    /* ── Optional sections (STT / TTS) ── */
    .opt-section {
      margin-top: 10px;
    }
    .opt-toggle {
      display: flex;
      align-items: center;
      gap: 7px;
      width: 100%;
      background: none;
      border: none;
      padding: 9px 12px;
      border-radius: 10px;
      font-size: 13px;
      color: #6a82a0;
      cursor: pointer;
      text-align: left;
      transition: background 0.15s, color 0.15s;
    }
    .opt-toggle:hover {
      background: rgba(100, 150, 220, 0.07);
      color: #9db0c8;
    }
    .opt-toggle.open {
      color: #74a8ff;
      background: rgba(100, 150, 255, 0.07);
    }
    .opt-toggle-icon {
      font-size: 15px;
      font-weight: 700;
      width: 16px;
      text-align: center;
      transition: transform 0.2s;
      flex-shrink: 0;
    }
    .opt-toggle.open .opt-toggle-icon {
      transform: rotate(45deg);
    }
    .opt-toggle-label {
      flex: 1;
    }
    .opt-chip {
      font-size: 11px;
      font-weight: 600;
      padding: 2px 8px;
      border-radius: 20px;
      color: #74d89f;
      background: rgba(100, 220, 155, 0.1);
      border: 1px solid rgba(100, 220, 155, 0.22);
      opacity: 0;
      transition: opacity 0.2s;
    }
    .opt-chip.visible {
      opacity: 1;
    }
    .opt-body {
      padding: 8px 2px 6px 4px;
      overflow: hidden;
    }
    .opt-body .row:last-child {
      margin-bottom: 0;
    }
    .opt-row-group {
      display: grid;
      grid-template-columns: 1fr 1fr;
      gap: 10px;
      margin-bottom: 14px;
    }
    .opt-row-group .row {
      margin-bottom: 0;
    }

    /* ── Custom endpoint section ── */
    #settings-toggle {
      display: block;
      margin-top: 8px;
      background: none;
      border: none;
      padding: 0;
      font-size: 13px;
      color: #6a82a0;
      cursor: pointer;
      text-decoration: underline;
      text-underline-offset: 3px;
      text-decoration-color: rgba(106, 130, 160, 0.4);
      transition: color 0.15s;
      width: auto;
    }
    #settings-toggle:hover { color: #9db0c8; }
    #settings-toggle.active { color: #74a8ff; }
    .custom-section { margin-top: 20px; }
    .custom-section-label {
      font-size: 12px;
      color: #7a90a8;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      margin-bottom: 14px;
    }
    .custom-hint {
      margin: 0 0 16px;
      font-size: 13px;
      color: #7a90a8;
    }
  </style>
</head>
<body>
  <main>
    <h1>激活 Hehe</h1>
    <p class="subtitle">输入 API Key，Hehe 会自动识别官方模型厂商。</p>

    <div class="model-note">
      支持自动检测 DeepSeek、MiniMax、OpenAI、通义千问、Moonshot、智谱等官方直连端点。
    </div>

    <!-- LLM Key -->
    <div class="row">
      <label for="apiKey">LLM API Key</label>
      <input id="apiKey" type="password" autocomplete="off" spellcheck="false" placeholder="请输入 LLM API Key" />
    </div>

    <!-- STT Optional Section -->
    <div class="opt-section">
      <button class="opt-toggle" id="stt-toggle" type="button">
        <span class="opt-toggle-icon">+</span>
        <span class="opt-toggle-label">语音识别 Key <span style="color:#7a90a8;font-weight:400;">（可选）</span></span>
        <span class="opt-chip" id="stt-chip">已配置</span>
      </button>
      <div class="opt-body" id="stt-body" style="display:none">
        <div class="row">
          <label for="stt-key">粘贴 Key 自动识别厂商</label>
          <div class="input-wrap">
            <input id="stt-key" class="has-detect" type="password" autocomplete="off" spellcheck="false"
              placeholder="API Key / SecretId / AppId" />
            <span class="detect-badge" id="stt-detect-badge"></span>
          </div>
        </div>
        <div id="stt-extra"></div>
      </div>
    </div>

    <!-- TTS Optional Section -->
    <div class="opt-section">
      <button class="opt-toggle" id="tts-toggle" type="button">
        <span class="opt-toggle-icon">+</span>
        <span class="opt-toggle-label">语音合成 Key <span style="color:#7a90a8;font-weight:400;">（可选）</span></span>
        <span class="opt-chip" id="tts-chip">已配置</span>
      </button>
      <div class="opt-body" id="tts-body" style="display:none">
        <div class="row">
          <label for="tts-key">粘贴 Key 自动识别厂商</label>
          <div class="input-wrap">
            <input id="tts-key" class="has-detect" type="password" autocomplete="off" spellcheck="false"
              placeholder="API Key" />
            <span class="detect-badge" id="tts-detect-badge"></span>
          </div>
        </div>
        <div id="tts-extra"></div>
      </div>
    </div>

    <div style="margin-top:20px;">
      <button class="primary" id="activate" disabled>自动识别并进入</button>
    </div>
    <div id="status" class="status"></div>
    <button id="settings-toggle" type="button">或使用自定义端点（本地模型）</button>

    <p class="hint">
      激活信息会保存到本地 <code>config.json</code>，仅用于连接对应厂商的官方 API。
    </p>

    <!-- Custom endpoint section -->
    <div id="custom-section" style="display:none;">
      <hr class="divider">
      <div class="custom-section">
        <div class="custom-section-label">自定义端点</div>
        <p class="custom-hint">Ollama、LM Studio 或其他兼容 OpenAI API 的本地/私有端点，API Key 可留空。</p>
        <div class="row">
          <label for="customBaseUrl">Base URL</label>
          <input id="customBaseUrl" type="text" placeholder="如 http://localhost:11434/v1" autocomplete="off" spellcheck="false" />
        </div>
        <div class="row">
          <label for="customModel">模型名称</label>
          <input id="customModel" type="text" placeholder="如 llama3.2, qwen2.5, mistral" autocomplete="off" spellcheck="false" />
        </div>
        <div class="row">
          <label for="customApiKey">API Key（可选）</label>
          <input id="customApiKey" type="password" placeholder="本地模型可留空" autocomplete="off" spellcheck="false" />
        </div>
        <button class="primary" id="activate-custom" disabled>测试连接并进入</button>
        <div id="custom-status" class="status"></div>
      </div>
    </div>
  </main>

  <script>
    const ACTIVATION_WARMUP_KEY = 'hehe_activation_warmup_until'
    const ACTIVATION_WARMUP_MS = 2500

    const apiKeyInput = document.getElementById('apiKey')
    const btn = document.getElementById('activate')
    const statusEl = document.getElementById('status')

    fetch('/activation-status')
      .then(r => r.json())
      .then(data => { if (data.activated) window.location.replace('/brain-ui') })
      .catch(() => {})

    function setStatus(text, kind) {
      statusEl.textContent = text
      statusEl.className = 'status' + (kind ? ' ' + kind : '')
    }

    function syncButtonState() {
      btn.disabled = apiKeyInput.value.trim().length === 0
    }

    // ── STT auto-detect ──
    // Returns { id, label, fields: [{id, label, placeholder, type}] } or null
    function detectSTTProvider(key) {
      if (!key) return null
      if (/^AKID/i.test(key)) return {
        id: 'tencent', label: '腾讯云 ASR',
        primaryField: 'tencentSecretId',
        extra: [
          { id: 'stt-tencent-skey', label: 'SecretKey', placeholder: '腾讯云 SecretKey', configKey: 'tencentSecretKey' },
          { id: 'stt-tencent-appid', label: 'AppId', placeholder: '腾讯云 AppId（数字）', configKey: 'tencentAppId' },
        ]
      }
      if (/^\d{6,10}$/.test(key)) return {
        id: 'xunfei', label: '科大讯飞',
        primaryField: 'xunfeiAppId',
        extra: [
          { id: 'stt-xunfei-apikey', label: 'ApiKey', placeholder: '讯飞 ApiKey', configKey: 'xunfeiApiKey' },
          { id: 'stt-xunfei-apisecret', label: 'ApiSecret', placeholder: '讯飞 ApiSecret', configKey: 'xunfeiApiSecret' },
        ]
      }
      if (key.length >= 20) return {
        id: 'aliyun', label: '阿里云百炼',
        primaryField: 'aliyunApiKey',
        extra: []
      }
      return null
    }

    // ── TTS auto-detect ──
    function detectTTSProvider(key) {
      if (!key) return null
      if (key.startsWith('sk-') && key.length > 30) return {
        id: 'openai', label: 'OpenAI TTS',
        primaryField: 'openaiTtsKey',
        ttsProvider: 'openai',
        extra: [
          { id: 'tts-openai-baseurl', label: 'Base URL（可选）', placeholder: '默认 OpenAI 官方端点', configKey: 'openaiTtsBaseURL', type: 'text' },
        ]
      }
      if (key.startsWith('sk_') || (/^[a-f0-9]{32}$/i.test(key) && !key.startsWith('sk'))) return {
        id: 'elevenlabs', label: 'ElevenLabs',
        primaryField: 'elevenLabsKey',
        ttsProvider: 'elevenlabs',
        extra: []
      }
      if (key.startsWith('eyJ') || (key.length >= 64 && /^[A-Za-z0-9\-_]+$/.test(key))) return {
        id: 'minimax', label: 'MiniMax TTS',
        primaryField: 'minimaxKey',
        ttsProvider: 'minimax',
        extra: []
      }
      if (key.length >= 20) return {
        id: 'doubao', label: '豆包 TTS',
        primaryField: 'doubaoKey',
        ttsProvider: 'doubao',
        extra: [
          { id: 'tts-doubao-appid', label: 'AppId（可选）', placeholder: '火山引擎 AppId', configKey: 'doubaoAppId', type: 'text' },
        ]
      }
      return null
    }

    // ── Generic optional section logic ──
    function setupOptSection({ toggleId, bodyId, keyInputId, detectBadgeId, extraContainerId, chipId, detectFn, configKey }) {
      const toggle = document.getElementById(toggleId)
      const body = document.getElementById(bodyId)
      const keyInput = document.getElementById(keyInputId)
      const badge = document.getElementById(detectBadgeId)
      const extra = document.getElementById(extraContainerId)
      const chip = document.getElementById(chipId)
      let detected = null

      toggle.addEventListener('click', () => {
        const isOpen = toggle.classList.contains('open')
        toggle.classList.toggle('open', !isOpen)
        body.style.display = isOpen ? 'none' : ''
        if (!isOpen) keyInput.focus()
      })

      keyInput.addEventListener('input', () => {
        const key = keyInput.value.trim()
        detected = detectFn(key)
        if (detected) {
          badge.textContent = detected.label
          badge.classList.add('visible')
        } else {
          badge.textContent = ''
          badge.classList.remove('visible')
        }
        renderExtra(detected)
        updateChip()
      })

      function renderExtra(info) {
        extra.innerHTML = ''
        if (!info || !info.extra || info.extra.length === 0) return
        const group = document.createElement('div')
        group.className = info.extra.length > 1 ? 'opt-row-group' : ''
        for (const f of info.extra) {
          const div = document.createElement('div')
          div.className = 'row'
          div.innerHTML = `<label for="${f.id}">${f.label}</label>
            <input id="${f.id}" type="${f.type || 'password'}" placeholder="${f.placeholder}"
              autocomplete="off" spellcheck="false" />`
          group.appendChild(div)
        }
        extra.appendChild(group)
      }

      function updateChip() {
        const hasKey = keyInput.value.trim().length > 0
        chip.classList.toggle('visible', hasKey)
      }

      function getConfig() {
        if (!keyInput.value.trim()) return null
        if (!detected) return null
        const cfg = { [detected.primaryField]: keyInput.value.trim() }
        if (detected.extra) {
          for (const f of detected.extra) {
            const el = document.getElementById(f.id)
            if (el && el.value.trim()) cfg[f.configKey] = el.value.trim()
          }
        }
        if (detected.ttsProvider) cfg.ttsProvider = detected.ttsProvider
        return cfg
      }

      return { getConfig, keyInput }
    }

    const sttSection = setupOptSection({
      toggleId: 'stt-toggle', bodyId: 'stt-body',
      keyInputId: 'stt-key', detectBadgeId: 'stt-detect-badge',
      extraContainerId: 'stt-extra', chipId: 'stt-chip',
      detectFn: detectSTTProvider,
    })

    const ttsSection = setupOptSection({
      toggleId: 'tts-toggle', bodyId: 'tts-body',
      keyInputId: 'tts-key', detectBadgeId: 'tts-detect-badge',
      extraContainerId: 'tts-extra', chipId: 'tts-chip',
      detectFn: detectTTSProvider,
    })

    // ── Main activate ──
    async function activate() {
      const apiKey = apiKeyInput.value.trim()
      if (!apiKey) return

      btn.disabled = true
      setStatus('正在自动识别 API Key 所属厂商...')

      try {
        const resp = await fetch('/activate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ apiKey, provider: 'auto' }),
        })
        const data = await resp.json().catch(() => ({}))
        if (!resp.ok || !data.ok) {
          setStatus(data.error || '激活失败', 'err')
          syncButtonState()
          return
        }

        // Save optional voice configs in parallel (fire-and-forget, don't block redirect)
        const sttCfg = sttSection.getConfig()
        const ttsCfg = ttsSection.getConfig()
        const saves = []
        if (sttCfg) {
          saves.push(fetch('/settings/voice', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(sttCfg),
          }).catch(() => {}))
        }
        if (ttsCfg) {
          saves.push(fetch('/settings/tts', {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify(ttsCfg),
          }).catch(() => {}))
        }
        if (saves.length) await Promise.all(saves)

        try { sessionStorage.setItem(ACTIVATION_WARMUP_KEY, String(Date.now() + ACTIVATION_WARMUP_MS)) } catch {}

        const voiceNote = [sttCfg && '语音识别', ttsCfg && '语音合成'].filter(Boolean)
        const suffix = voiceNote.length ? `，已保存 ${voiceNote.join('+')} 配置` : ''
        setStatus(`激活成功：${data.provider} · ${data.model}${suffix}`, 'ok')
        setTimeout(() => window.location.replace('/brain-ui'), 700)
      } catch (err) {
        setStatus('网络错误：' + err.message, 'err')
        syncButtonState()
      }
    }

    btn.addEventListener('click', activate)
    apiKeyInput.addEventListener('input', syncButtonState)
    apiKeyInput.addEventListener('keydown', event => {
      if (event.key === 'Enter' && !btn.disabled) activate()
    })
    syncButtonState()
    apiKeyInput.focus()

    // ── Custom endpoint ──
    const settingsToggle = document.getElementById('settings-toggle')
    const customSection  = document.getElementById('custom-section')
    const customBaseUrlInput = document.getElementById('customBaseUrl')
    const customModelInput   = document.getElementById('customModel')
    const customApiKeyInput  = document.getElementById('customApiKey')
    const customActivateBtn  = document.getElementById('activate-custom')
    const customStatusEl     = document.getElementById('custom-status')

    settingsToggle.addEventListener('click', () => {
      const hidden = customSection.style.display === 'none'
      customSection.style.display = hidden ? '' : 'none'
      settingsToggle.classList.toggle('active', hidden)
      if (hidden) customBaseUrlInput.focus()
    })

    function syncCustomButtonState() {
      customActivateBtn.disabled = !customBaseUrlInput.value.trim() || !customModelInput.value.trim()
    }

    function setCustomStatus(text, kind) {
      customStatusEl.textContent = text
      customStatusEl.className = 'status' + (kind ? ' ' + kind : '')
    }

    async function activateCustom() {
      const baseURL = customBaseUrlInput.value.trim()
      const model   = customModelInput.value.trim()
      const apiKey  = customApiKeyInput.value.trim() || 'none'
      if (!baseURL || !model) return

      customActivateBtn.disabled = true
      setCustomStatus('正在连接测试…')

      try {
        const resp = await fetch('/activate', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ provider: 'custom', baseURL, model, apiKey }),
        })
        const data = await resp.json().catch(() => ({}))
        if (!resp.ok || !data.ok) {
          setCustomStatus(data.error || '连接失败，请检查端点地址和模型名称', 'err')
          syncCustomButtonState()
          return
        }
        setCustomStatus(`激活成功：${data.model}`, 'ok')
        setTimeout(() => window.location.replace('/brain-ui'), 700)
      } catch (err) {
        setCustomStatus('网络错误：' + err.message, 'err')
        syncCustomButtonState()
      }
    }

    customActivateBtn.addEventListener('click', activateCustom)
    customBaseUrlInput.addEventListener('input', syncCustomButtonState)
    customModelInput.addEventListener('input', syncCustomButtonState)
    customModelInput.addEventListener('keydown', e => {
      if (e.key === 'Enter' && !customActivateBtn.disabled) activateCustom()
    })
  </script>
</body>
</html>
